<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERMINIO METELE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }
    .frase {
      color: #fff;
      font-size: clamp(2.5rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff8a00, #e52e71, #ff8a00);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s linear infinite, pop 1.2s ease-out;
      text-shadow: 0 0 40px rgba(229, 46, 113, 0.3);
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <h1 class="frase">Herminio<br />Metele</h1>
</body>
</html>
